name: Ping Supabase Alive

on:
  schedule:
    - cron: '0 1 * * 1,4' 
  workflow_dispatch:     

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/ping?select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
